# YOLOv8 Retail Foot-Traffic Dataset Configuration Template
# To use this:
# 1. Export your labeled dataset from CVAT/Roboflow in YOLOv8 format.
# 2. Extract it to the 'backend/dataset' folder (or update paths below).
# 3. Run: python train.py --data dataset.yaml

path: ./dataset  # dataset root dir
train: images/train  # train images (relative to 'path')
val: images/val  # validation images (relative to 'path')
test: images/test  # test images (optional)

# Classes
names:
  0: person
